<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="classes-box">

        <h1>Submit a New Workshop</h1>

        <label>Branch</label>
        <input type="text" id="adminBranch">

        <label>Class Name</label>
        <input type="text" id="adminClass">

        <label>Date</label>
        <input type="text" id="adminDate" placeholder="mm/dd/yyyy">

        <label>Time</label>
        <input type="text" id="adminTime" placeholder="ex: 9-11 am">

        <label>Description</label>
        <textarea id="adminDescription"></textarea>

        <label>Address</label>
        <input type="text" id="adminAddress">

        <button onclick="addClass()">
            Add Class
        </button>
     
<button onclick="clearRegistrations()">
    Clear Registrations
</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
