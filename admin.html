<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Class Entry</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="classes-box">
    <h1>ADMIN WORKSHOP ENTRY</h1>
    <p class=subtitle>
    Admin, enter in your location and class details to add to the class google sheet
    </p>

    <label for="adminBranch">Branch</label>
    <input type="text" id="adminBranch" placeholder="Denver">

    <label for="adminClass">Class Name</label>
    <input type="text" id="adminClass" placeholder="Lighting Design">

    <label for="adminDate">Date</label>
    <input type="text" id="adminDate" placeholder="MM/DD/YYYY">

    <label for="adminTime">Time</label>
    <input type="text" id="adminTime" placeholder="9-11 AM">

    <label for="adminDescription">Description</label>
    <textarea id="adminDescription" placeholder="Enter class description"></textarea>

    <label for="adminAddress">Address</label>
    <input type="text" id="adminAddress" placeholder="123 Main St, Denver, CO">

    <button type="button" onclick="addClass()">Add Class</button>

    <button type="button" onclick="clearRegistrations()">
        Clear Registrations and Classes
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
