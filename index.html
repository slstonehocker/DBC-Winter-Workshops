<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="classes-box">
    <h1>2026 WINTER WORKSHOPS</h1>

    <p class="subtitle">
        Please select your preferred workshop information below.
    </p>

    <label for="name">Employee Name</label>
    <input type="text" id="name" placeholder="Full Name">

    <label for="email">Employee Email</label>
    <input type="email" id="email" placeholder="Email">

    <label for="confirmEmail">Confirm Email</label>
    <input type="email" id="confirmEmail" placeholder="Re-enter Email">

    <label for="phone">Employee Phone</label>
    <input type="text" id="phone" placeholder="Phone">

    <label for="branch">Branch of Class</label>
    <select id="branch" onchange="updateClasses()">
        <option value="">Loading branches...</option>
    </select>

    <label for="trainingClass">Which class would you like to sign up for?</label>
    <select id="trainingClass">
        <option value="">Select Class</option>
    </select>

    <p id="classDescription"></p>

    <button type="button" onclick="registerEmployee()">Register</button>
</div>

<script>
    const script = document.createElement("script");
    script.src = "script.js?v=" + new Date().getTime();
    document.body.appendChild(script);
</script>
</body>
</html>
